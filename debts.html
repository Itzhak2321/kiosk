<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חובות - גרסת פרו</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent-blue: #0d6efd;
            --accent-green: #198754;
            --accent-red: #dc3545;
        }

        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 100px; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* כותרת עליונה */
        .total-box { background: #111; border-bottom: 3px solid var(--accent-blue); padding: 20px; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; }
        
        /* כרטיסי לקוחות */
        .card { background-color: var(--card-bg); border: 1px solid #333; border-radius: 20px; color: var(--text-main); }
        .badge-price { background-color: #2a0a0a; color: #ff4d4d; padding: 10px; border-radius: 12px; font-size: 1.2rem; border: 1px solid #500; min-width: 85px; text-align: center; }

        /* היסטוריה צבעונית */
        .hist-item { padding: 8px; border-bottom: 1px solid #333; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; line-height: 1.4; }
        .hist-add { color: #ff6b6b; border-right: 3px solid #ff6b6b; padding-right: 8px; } /* אדום לקנייה */
        .hist-pay { color: #2ecc71; border-right: 3px solid #2ecc71; padding-right: 8px; } /* ירוק לתשלום */

        /* עיצוב חיפוש */
        .search-container { position: relative; margin-bottom: 25px; }
        .search-box { background: #222 !important; border: 2px solid #333 !important; color: white !important; border-radius: 15px !important; padding: 12px 20px !important; }

        /* חלונית הוספה צפה (Modal) */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content-custom { background: #1a1a1a; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--accent-blue); box-shadow: 0 0 30px rgba(13, 110, 253, 0.3); }
        .modal-content-custom input { margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 12px; width: 100%; }

        /* כפתור פלוס */
        .fab { position: fixed; bottom: 30px; left: 30px; width: 65px; height: 65px; background-color: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 5px 20px rgba(13,110,253,0.5); cursor: pointer; border: none; z-index: 1000; }
        
        .history-section { display: none; background: #0a0a0a; border-radius: 15px; padding: 10px; margin-top: 15px; border: 1px solid #333; max-height: 200px; overflow-y: auto; }
        .btn-pay { background-color: var(--accent-green); color: white; font-weight: bold; border-radius: 12px; border: none; padding: 10px; transition: 0.2s; }
        .btn-add-debt { background-color: var(--accent-blue); color: white; font-weight: bold; border-radius: 12px; border: none; padding: 10px; transition: 0.2s; }
        .btn-pay:active, .btn-add-debt:active { opacity: 0.7; transform: scale(0.95); }

        .phone-link { color: #0dcaf0; text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div id="modalOverlay" class="overlay">
    <div class="modal-content-custom animate__animated animate__zoomIn">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 text-primary fw-bold">פתיחת כרטיס חדש</h4>
            <button class="btn-close btn-close-white" onclick="toggleAddForm()"></button>
        </div>
        <input type="text" id="custName" placeholder="שם הלקוח">
        <input type="tel" id="custPhone" placeholder="טלפון">
        <input type="number" id="amount" placeholder="סכום חוב התחלתי">
        <input type="text" id="note" placeholder="פירוט (אופציונלי)">
        <button onclick="saveToFirebase()" class="btn btn-primary w-100 fw-bold py-3 mt-2" style="border-radius: 15px;">צור כרטיס</button>
    </div>
</div>

<div class="total-box text-center">
    <p class="text-secondary small mb-1">סה"כ חובות לקוחות</p>
    <h1 class="display-4 fw-bold text-white" id="totalDebtDisplay">₪0</h1>
</div>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchBox" class="form-control search-box" placeholder="🔍 חפש שם או טלפון..." onkeyup="filterDebts()">
    </div>

    <div id="debtContainer" class="row g-4"></div>
</div>

<button class="fab" onclick="toggleAddForm()">+</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const debtsRef = ref(db, 'debts');

    window.toggleAddForm = () => {
        const modal = document.getElementById('modalOverlay');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    };

    window.saveToFirebase = () => {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const amt = parseFloat(document.getElementById('amount').value);
        const note = document.getElementById('note').value.trim();

        if (!name || isNaN(amt)) return alert("חובה למלא שם וסכום");

        const date = new Date().toLocaleDateString('he-IL');
        push(debtsRef, {
            customer: name,
            phone: phone || "אין טלפון",
            price: amt,
            history: [{ type: 'add', text: `${date}: פתיחת חוב ₪${amt} (${note || 'כללי'})` }],
            date: date
        }).then(() => { 
            toggleAddForm();
            document.getElementById('custName').value = '';
            document.getElementById('custPhone').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        });
    };

    window.partialPayment = (id, currentData) => {
        const val = parseFloat(prompt("סכום התשלום שהתקבל (₪):"));
        if (isNaN(val) || val <= 0) return;
        const newTotal = currentData.price - val;
        const date = new Date().toLocaleDateString('he-IL');
        const newHistory = currentData.history || [];
        newHistory.push({ type: 'pay', text: `${date}: ✅ תשלום ₪${val}. יתרה: ₪${newTotal.toFixed(2)}` });
        update(ref(db, `debts/${id}`), { price: newTotal, history: newHistory });
    };

    window.addToDebt = (id, currentData) => {
        const val = parseFloat(prompt("סכום הקנייה החדשה (₪):"));
        const note = prompt("מה נקנה?");
        if (isNaN(val) || val <= 0) return;
        const newTotal = currentData.price + val;
        const date = new Date().toLocaleDateString('he-IL');
        const newHistory = currentData.history || [];
        newHistory.push({ type: 'add', text: `${date}: 🛒 קנייה ₪${val} (${note || 'כללי'}). יתרה: ₪${newTotal.toFixed(2)}` });
        update(ref(db, `debts/${id}`), { price: newTotal, history: newHistory });
    };

    window.toggleHistory = (id) => {
        const el = document.getElementById('hist-' + id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    };

    window.deleteItem = (id) => { if(confirm("למחוק את כרטיס הלקוח?")) remove(ref(db, `debts/${id}`)); };

    window.filterDebts = () => {
        const q = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('.customer-col').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(q) ? 'block' : 'none';
        });
    };

    onValue(debtsRef, (snap) => {
        const data = snap.val();
        const container = document.getElementById('debtContainer');
        let total = 0; container.innerHTML = "";
        if (data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                total += item.price;
                const historyHtml = (item.history || []).map(h => {
                    const isPay = h.type === 'pay' || (typeof h === 'string' && h.includes('תשלום'));
                    const cls = isPay ? 'hist-pay' : 'hist-add';
                    const txt = typeof h === 'string' ? h : h.text;
                    return `<div class="hist-item ${cls}">${txt}</div>`;
                }).reverse().join('');

                container.innerHTML += `
                    <div class="col-md-6 col-lg-4 customer-col">
                        <div class="card p-4 h-100 shadow border-2">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <h3 class="fw-bold mb-0 text-primary">${item.customer}</h3>
                                    ${item.phone !== 'אין טלפון' ? 
                                        `<a href="tel:${item.phone}" class="phone-link">📞 ${item.phone}</a>` : 
                                        `<small class="text-secondary">אין טלפון</small>`
                                    }
                                </div>
                                <div class="badge-price fw-bold">₪${item.price.toFixed(2)}</div>
                            </div>
                            <div class="d-flex gap-2 mb-3">
                                <button onclick='partialPayment("${key}", ${JSON.stringify(item)})' class="btn btn-pay flex-grow-1">₪ תשלום</button>
                                <button onclick='addToDebt("${key}", ${JSON.stringify(item)})' class="btn btn-add-debt flex-grow-1">+ הוספה</button>
                            </div>
                            <button onclick="toggleHistory('${key}')" class="btn btn-outline-light w-100 fw-bold border-2">📜 פירוט היסטוריה</button>
                            <div id="hist-${key}" class="history-section">
                                <div class="d-flex flex-column">${historyHtml}</div>
                            </div>
                            <button onclick="deleteItem('${key}')" class="btn btn-sm btn-link text-danger text-decoration-none mt-3 opacity-25 w-100">מחיקת לקוח</button>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('totalDebtDisplay').innerText = "₪" + total.toLocaleString();
    });
</script>
</body>
</html>
