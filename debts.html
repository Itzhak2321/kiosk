<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חובות עם היסטוריה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: system-ui; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .total-box { background: #212529; color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .history-list { font-size: 0.85rem; max-height: 100px; overflow-y: auto; background: #fff; border-radius: 5px; padding: 5px; margin-top: 10px; border: 1px solid #eee; }
        .debt-card { border-right: 6px solid #dc3545 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="total-box text-center shadow">
        <h2 class="mb-0">סה"כ חובות: <span id="totalDebtDisplay">₪0</span></h2>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">רישום חוב חדש</h5>
            <div class="row g-2">
                <div class="col-md-4"><input type="text" id="custName" class="form-control" placeholder="שם הלקוח"></div>
                <div class="col-md-3"><input type="number" id="amount" class="form-control" placeholder="סכום"></div>
                <div class="col-md-3"><input type="text" id="note" class="form-control" placeholder="תיאור קצר"></div>
                <div class="col-md-2"><button onclick="saveToFirebase()" class="btn btn-primary w-100">שמור</button></div>
            </div>
        </div>
    </div>

    <div id="debtContainer" class="row"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const debtsRef = ref(db, 'debts');

    // שמירת חוב ראשוני
    window.saveToFirebase = function() {
        const name = document.getElementById('custName').value.trim();
        const amt = parseFloat(document.getElementById('amount').value);
        const note = document.getElementById('note').value.trim();

        if (!name || isNaN(amt)) return alert("מלא שם וסכום תקין");

        const firstLog = `${new Date().toLocaleDateString('he-IL')}: פתיחת חוב ₪${amt} (${note || 'ללא תיאור'})`;

        push(debtsRef, {
            customer: name,
            price: amt,
            history: [firstLog],
            date: new Date().toLocaleDateString('he-IL')
        }).then(() => {
            document.getElementById('custName').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        });
    };

    // עדכון חוב (תשלום חלקי או הוספה)
    window.updateDebt = function(id, currentData) {
        const action = prompt("בחר פעולה:\n1. תשלום (יוריד מהחוב)\n2. הוספת קנייה (יוסיף לחוב)", "1");
        if (!action) return;

        const val = parseFloat(prompt("הזן סכום (₪):"));
        if (isNaN(val)) return alert("סכום לא תקין");

        let newTotal = currentData.price;
        let logMsg = "";
        const date = new Date().toLocaleDateString('he-IL');

        if (action === "1") {
            newTotal -= val;
            logMsg = `${date}: שולם ₪${val}. יתרה: ₪${newTotal.toFixed(2)}`;
        } else {
            newTotal += val;
            logMsg = `${date}: נוספה קנייה ב-₪${val}. יתרה: ₪${newTotal.toFixed(2)}`;
        }

        const newHistory = currentData.history || [];
        newHistory.push(logMsg);

        update(ref(db, `debts/${id}`), {
            price: newTotal,
            history: newHistory
        });
    };

    window.deleteItem = function(id) {
        if(confirm("למחוק את כל כרטיס הלקוח?")) remove(ref(db, `debts/${id}`));
    };

    onValue(debtsRef, (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('debtContainer');
        let totalSum = 0;
        container.innerHTML = ""; 

        if (data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                totalSum += item.price;
                const historyHtml = (item.history || []).map(line => `<li>${line}</li>`).join('');
                
                container.innerHTML += `
                    <div class="col-md-6 col-lg-4 mb-3">
                        <div class="card shadow-sm debt-card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <h5 class="fw-bold text-dark">${item.customer}</h5>
                                    <span class="badge bg-danger fs-6">₪${item.price.toFixed(2)}</span>
                                </div>
                                
                                <div class="history-list">
                                    <ul class="list-unstyled mb-0">${historyHtml}</ul>
                                </div>

                                <div class="d-flex gap-2 mt-3">
                                    <button onclick='updateDebt("${key}", ${JSON.stringify(item)})' class="btn btn-sm btn-warning flex-grow-1">עדכון / תשלום</button>
                                    <button onclick="deleteItem('${key}')" class="btn btn-sm btn-outline-success">סגור הכל</button>
                                </div>
                                <a href="https://wa.me/?text=${encodeURIComponent('היי ' + item.customer + ', יתרת החוב המעודכנת שלך היא ₪' + item.price.toFixed(2))}" target="_blank" class="btn btn-sm btn-outline-primary w-100 mt-2">שלח וואטסאפ</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('totalDebtDisplay').innerText = "₪" + totalSum.toLocaleString();
    });
</script>

</body>
</html>
