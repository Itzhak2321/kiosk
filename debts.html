<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חובות לקוחות</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .total-banner { background: #2c3e50; color: white; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .debt-card { border-right: 5px solid #e74c3c; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="total-banner text-center shadow-sm">
        <h4>סה"כ חובות פתוחים: <span id="totalDebtAmount">₪0</span></h4>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">רישום חוב חדש</h5>
            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" id="custName" class="form-control" placeholder="שם הלקוח">
                </div>
                <div class="col-md-2">
                    <input type="number" id="amount" class="form-control" placeholder="סכום">
                </div>
                <div class="col-md-4">
                    <input type="text" id="note" class="form-control" placeholder="פירוט (למשל: סיגריות, שתייה)">
                </div>
                <div class="col-md-3">
                    <button onclick="addNewDebt()" class="btn btn-danger w-100">הוסף חוב</button>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <input type="text" id="searchInput" class="form-control" placeholder="חפש לקוח..." onkeyup="filterDebts()">
    </div>

    <div id="debtDisplay" class="row g-3"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // השתמש ב-Config הקיים של המלאי שלך כאן
    const firebaseConfig = {
        apiKey: "YOUR_EXISTING_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // שימוש בנתיב נפרד בשם 'debts' באותו פרויקט
    const debtsRef = ref(db, 'debts');

    // הוספת חוב לבסיס הנתונים
    window.addNewDebt = function() {
        const name = document.getElementById('custName').value;
        const amt = document.getElementById('amount').value;
        const details = document.getElementById('note').value;

        if(name && amt) {
            push(debtsRef, {
                name: name,
                amount: parseFloat(amt),
                note: details,
                timestamp: Date.now(),
                dateStr: new Date().toLocaleDateString('he-IL')
            });
            document.getElementById('custName').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        }
    };

    // משיכת נתונים בזמן אמת
    onValue(debtsRef, (snapshot) => {
        const data = snapshot.val();
        const display = document.getElementById('debtDisplay');
        let total = 0;
        display.innerHTML = '';

        if (data) {
            for (let id in data) {
                const item = data[id];
                total += item.amount;
                display.innerHTML += `
                    <div class="col-md-6 col-lg-4 debt-item" data-name="${item.name}">
                        <div class="card debt-card shadow-sm h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <h5 class="card-title">${item.name}</h5>
                                    <span class="badge bg-danger">₪${item.amount}</span>
                                </div>
                                <p class="text-muted small mb-2">${item.dateStr} | ${item.note || 'אין פירוט'}</p>
                                <div class="btn-group w-100">
                                    <button onclick="closeDebt('${id}')" class="btn btn-sm btn-outline-success">סגור חוב</button>
                                    <a href="https://wa.me/?text=${encodeURIComponent('היי ' + item.name + ', מעדכן אותך על יתרת חוב בסך ₪' + item.amount)}" target="_blank" class="btn btn-sm btn-outline-primary">שלח תזכורת</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        document.getElementById('totalDebtAmount').innerText = '₪' + total.toFixed(2);
    });

    window.closeDebt = function(id) {
        if(confirm("למחוק את החוב?")) {
            remove(ref(db, `debts/${id}`));
        }
    };

    // סינון/חיפוש לקוחות
    window.filterDebts = function() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.debt-item').forEach(item => {
            const name = item.getAttribute('data-name').toLowerCase();
            item.style.display = name.includes(term) ? 'block' : 'none';
        });
    };
</script>

</body>
</html>
