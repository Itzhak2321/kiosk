<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חובות לקוחות</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { margin-bottom: 15px; border-radius: 12px; border: none; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .total-box { background: #343a40; color: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="total-box text-center shadow">
        <h2 class="mb-0">סה"כ חובות: <span id="totalDebtDisplay">₪0</span></h2>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">רישום חוב חדש</h5>
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" id="custName" class="form-control" placeholder="שם הלקוח">
                </div>
                <div class="col-md-3">
                    <input type="number" id="amount" class="form-control" placeholder="סכום בשח">
                </div>
                <div class="col-md-3">
                    <input type="text" id="note" class="form-control" placeholder="פירוט (אופציונלי)">
                </div>
                <div class="col-md-2">
                    <button onclick="saveToFirebase()" class="btn btn-primary w-100">שמור חוב</button>
                </div>
            </div>
        </div>
    </div>

    <hr>

    <h4 class="mb-3">רשימת לקוחות חייבים:</h4>
    <div id="debtContainer" class="row">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- החלף כאן בפרטים שלך מה-Firebase Console ---
    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };

    // אתחול פיירבייס
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const debtsRef = ref(db, 'debts'); // תיקיית חובות

    // פונקציה לשמירת חוב
    window.saveToFirebase = function() {
        const name = document.getElementById('custName').value;
        const amt = document.getElementById('amount').value;
        const note = document.getElementById('note').value;

        if (!name || !amt) {
            alert("נא להזין שם וסכום");
            return;
        }

        push(debtsRef, {
            customer: name,
            price: parseFloat(amt),
            details: note,
            date: new Date().toLocaleDateString('he-IL')
        }).then(() => {
            // ניקוי שדות אחרי הצלחה
            document.getElementById('custName').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        }).catch(err => alert("שגיאה: " + err.message));
    };

    // פונקציה למחיקת חוב (תשלום)
    window.deleteItem = function(id) {
        if(confirm("האם החוב שולם?")) {
            remove(ref(db, 'debts/' + id));
        }
    };

    // האזנה לנתונים בזמן אמת מהפירבייס
    onValue(debtsRef, (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('debtContainer');
        let totalSum = 0;
        container.innerHTML = ""; // ניקוי הרשימה לפני ריענון

        if (data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                totalSum += item.price;
                
                container.innerHTML += `
                    <div class="col-md-4">
                        <div class="card shadow-sm border-start border-danger border-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <h5 class="card-title">${item.customer}</h5>
                                    <span class="badge bg-danger fs-6">₪${item.price}</span>
                                </div>
                                <p class="card-text text-muted small">${item.details || 'ללא פירוט'}<br>${item.date}</p>
                                <button onclick="deleteItem('${key}')" class="btn btn-sm btn-outline-success w-100">סגור חוב (שולם)</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        } else {
            container.innerHTML = "<p class="text-center">אין חובות פתוחים כרגע.</p>";
        }
        document.getElementById('totalDebtDisplay').innerText = "₪" + totalSum.toLocaleString();
    });
</script>

</body>
</html>
