<button onclick="saveDebt()" class="btn btn-danger w-100">הוסף חוב</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // *** שים לב: כאן אתה חייב להכניס את הנתונים המדויקים מהפרויקט שלך ***
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        // ב-Realtime Database חשוב מאוד שהשורה הזו תהיה קיימת ומדויקת:
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com", 
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    // אתחול
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const debtsRef = ref(db, 'debts');

    // חשיפת הפונקציה לחלון (כדי שה-onclick ב-HTML יעבוד)
    window.saveDebt = function() {
        const name = document.getElementById('custName').value.trim();
        const amt = document.getElementById('amount').value;
        const details = document.getElementById('note').value.trim();

        if (name === "" || amt === "") {
            alert("חובה למלא שם וסכום");
            return;
        }

        // שמירה לתוך נתיב 'debts' תחת אותו חשבון
        push(debtsRef, {
            name: name,
            amount: parseFloat(amt),
            note: details,
            date: new Date().toLocaleDateString('he-IL'),
            timestamp: Date.now()
        }).then(() => {
            console.log("הנתונים נשמרו בהצלחה!");
            // איפוס השדות
            document.getElementById('custName').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        }).catch((error) => {
            console.error("שגיאה בשמירה:", error);
            alert("שגיאה: " + error.message);
        });
    };

    // הצגת הנתונים (נשאר דומה)
    onValue(debtsRef, (snapshot) => {
        const data = snapshot.val();
        const display = document.getElementById('debtDisplay');
        let total = 0;
        display.innerHTML = '';

        if (data) {
            Object.keys(data).forEach(id => {
                const item = data[id];
                total += item.amount;
                display.innerHTML += `
                    <div class="col-md-6 col-lg-4 debt-item" data-name="${item.name}">
                        <div class="card shadow-sm mb-3">
                            <div class="card-body">
                                <h5>${item.name} <span class="badge bg-danger float-end">₪${item.amount}</span></h5>
                                <p class="small text-muted">${item.note || 'ללא פירוט'}<br>${item.date}</p>
                                <button onclick="deleteDebt('${id}')" class="btn btn-sm btn-success w-100">סומן כמשולם</button>
                            </div>
                        </div>
                    </div>`;
            });
        }
        document.getElementById('totalDebtAmount').innerText = '₪' + total.toFixed(2);
    });

    window.deleteDebt = function(id) {
        if(confirm("למחוק את החוב?")) {
            remove(ref(db, `debts/${id}`));
        }
    };
</script>
