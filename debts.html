<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול חובות - צבעים מודגשים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent-blue: #007bff;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
        }

        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 100px; font-family: 'Segoe UI', sans-serif; }
        .total-box { background: #111; border-bottom: 3px solid var(--accent-blue); padding: 30px; margin-bottom: 25px; }
        .card { background-color: var(--card-bg); border: 2px solid #333; border-radius: 20px; color: var(--text-main); }
        
        /* צבעים להיסטוריה */
        .hist-add { color: #ff6b6b; font-weight: bold; } /* אדום לקנייה */
        .hist-pay { color: #51cf66; font-weight: bold; } /* ירוק לתשלום */
        
        .form-control { background-color: #222; border: 2px solid #444; color: white; border-radius: 12px; }
        .form-control:focus { border-color: var(--accent-blue); box-shadow: none; background: #222; color: white; }
        
        .fab { position: fixed; bottom: 30px; left: 30px; width: 70px; height: 70px; background-color: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 0 20px rgba(0,123,255,0.4); cursor: pointer; border: none; z-index: 1000; }
        
        .history-section { display: none; background: #000; border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #444; max-height: 250px; overflow-y: auto; }
        .btn-pay { background-color: var(--accent-green); color: black; font-weight: 800; border-radius: 12px; }
        .btn-add-debt { background-color: var(--accent-blue); color: white; font-weight: 800; border-radius: 12px; }
        
        #addCustomerSection { display: none; margin-bottom: 25px; border: 2px solid var(--accent-blue); }
        .badge-price { background-color: #330000; color: #ff4444; padding: 12px; border-radius: 15px; font-size: 1.4rem; border: 1px solid #660000; }
    </style>
</head>
<body>

<div class="total-box text-center shadow-lg">
    <p class="text-uppercase mb-1" style="color: #aaa; letter-spacing: 2px;">סה"כ חובות לקוחות</p>
    <h1 class="display-2 fw-bold text-white" id="totalDebtDisplay">₪0</h1>
</div>

<div class="container">
    <div id="addCustomerSection" class="card shadow-lg mb-4">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between mb-3 align-items-center">
                <h4 class="mb-0 text-info">פתיחת כרטיס חדש</h4>
                <button class="btn-close btn-close-white" onclick="toggleAddForm()"></button>
            </div>
            <div class="row g-3">
                <div class="col-md-3"><input type="text" id="custName" class="form-control" placeholder="שם הלקוח"></div>
                <div class="col-md-3"><input type="tel" id="custPhone" class="form-control" placeholder="טלפון"></div>
                <div class="col-md-2"><input type="number" id="amount" class="form-control" placeholder="סכום"></div>
                <div class="col-md-2"><input type="text" id="note" class="form-control" placeholder="פירוט"></div>
                <div class="col-md-2"><button onclick="saveToFirebase()" class="btn btn-info w-100 fw-bold">צור כרטיס</button></div>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <input type="text" id="searchBox" class="form-control form-control-lg py-3" placeholder="🔍 חפש שם או טלפון..." onkeyup="filterDebts()">
    </div>

    <div id="debtContainer" class="row g-4"></div>
</div>

<button class="fab" onclick="toggleAddForm()">+</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const debtsRef = ref(db, 'debts');

    window.toggleAddForm = () => {
        const s = document.getElementById('addCustomerSection');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
    };

    window.saveToFirebase = () => {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const amt = parseFloat(document.getElementById('amount').value);
        const note = document.getElementById('note').value.trim();

        if (!name || isNaN(amt)) return alert("שם וסכום חובה");

        const date = new Date().toLocaleDateString('he-IL');
        push(debtsRef, {
            customer: name,
            phone: phone || "אין טלפון",
            price: amt,
            history: [{ type: 'add', text: `${date}: פתיחת חוב ₪${amt} (${note || 'כללי'})` }],
            date: date
        }).then(() => { toggleAddForm(); location.reload(); });
    };

    window.partialPayment = (id, currentData) => {
        const val = parseFloat(prompt("כמה הלקוח שילם? (₪):"));
        if (isNaN(val) || val <= 0) return;

        const newTotal = currentData.price - val;
        const date = new Date().toLocaleDateString('he-IL');
        const newHistory = currentData.history || [];
        newHistory.push({ type: 'pay', text: `${date}: תשלום התקבל ₪${val}. יתרה: ₪${newTotal.toFixed(2)}` });

        update(ref(db, `debts/${id}`), { price: newTotal, history: newHistory });
    };

    window.addToDebt = (id, currentData) => {
        const val = parseFloat(prompt("סכום הקנייה החדשה (₪):"));
        const note = prompt("מה הוא קנה?");
        if (isNaN(val) || val <= 0) return;

        const newTotal = currentData.price + val;
        const date = new Date().toLocaleDateString('he-IL');
        const newHistory = currentData.history || [];
        newHistory.push({ type: 'add', text: `${date}: קנייה חדשה ₪${val} (${note || 'ללא פירוט'}). יתרה: ₪${newTotal.toFixed(2)}` });

        update(ref(db, `debts/${id}`), { price: newTotal, history: newHistory });
    };

    window.toggleHistory = (id) => {
        const el = document.getElementById('hist-' + id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    };

    window.deleteItem = (id) => { if(confirm("למחוק הכל?")) remove(ref(db, `debts/${id}`)); };

    window.filterDebts = () => {
        const q = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('.customer-col').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(q) ? 'block' : 'none';
        });
    };

    onValue(debtsRef, (snap) => {
        const data = snap.val();
        const container = document.getElementById('debtContainer');
        let total = 0; container.innerHTML = "";

        if (data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                total += item.price;
                // עיבוד ההיסטוריה עם צבעים
                const historyHtml = (item.history || []).map(h => {
                    const cls = h.type === 'pay' ? 'hist-pay' : 'hist-add';
                    const symbol = h.type === 'pay' ? '✔' : '❌';
                    const text = typeof h === 'string' ? h : h.text; // תמיכה בנתונים ישנים
                    return `<li class="${cls}">${symbol} ${text}</li>`;
                }).reverse().join('');

                container.innerHTML += `
                    <div class="col-md-6 col-lg-4 customer-col">
                        <div class="card p-4 h-100 shadow">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <h3 class="fw-bold mb-1 text-info">${item.customer}</h3>
                                    <div class="text-secondary small">📞 ${item.phone}</div>
                                </div>
                                <div class="badge-price fw-bold text-center">₪${item.price.toFixed(2)}</div>
                            </div>
                            
                            <div class="d-flex gap-2 mb-2">
                                <button onclick='partialPayment("${key}", ${JSON.stringify(item)})' class="btn btn-pay flex-grow-1 py-2">₪ תשלום</button>
                                <button onclick='addToDebt("${key}", ${JSON.stringify(item)})' class="btn btn-add-debt flex-grow-1 py-2">+ הוספה</button>
                            </div>
                            <button onclick="toggleHistory('${key}')" class="btn btn-outline-light w-100 mb-2">📜 פירוט היסטוריה</button>

                            <div id="hist-${key}" class="history-section">
                                <ul class="list-unstyled mb-0">${historyHtml}</ul>
                            </div>
                            
                            <button onclick="deleteItem('${key}')" class="btn btn-sm btn-link text-danger text-decoration-none mt-2 opacity-50">מחיקת לקוח</button>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('totalDebtDisplay').innerText = "₪" + total.toLocaleString();
    });
</script>

</body>
</html>
