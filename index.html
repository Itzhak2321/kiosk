<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול חוסרים Pro Vision</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #ff5252;
            --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 180px; direction: rtl; }
        
        .header { background: var(--surface); color: var(--primary); text-align: center; padding: 15px; font-weight: bold; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        
        .tabs { display: flex; background: var(--surface); border-bottom: 1px solid #333; }
        .tab { flex: 1; text-align: center; padding: 14px; cursor: pointer; color: #888; border-bottom: 3px solid transparent; font-weight: bold; }
        .tab.active { color: var(--secondary); border-bottom-color: var(--secondary); background: #252525; }
        
        .search-container { padding: 10px; }
        #searchInput { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: var(--surface); color: #fff; box-sizing: border-box; font-size: 16px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        
        .item { 
            background: var(--surface); border-radius: 12px; text-align: center; 
            border: 1px solid #333; cursor: pointer; position: relative; 
            display: flex; flex-direction: column; min-height: 140px; overflow: hidden;
        }
        /* הדגשה למוצרים שנבחרו */
        .item.has-qty { border: 2px solid var(--secondary); background: #1b3a36; }
        
        .item-img { width: 100%; height: 80px; object-fit: cover; background: #2a2a2a; }
        .item-name { font-weight: bold; font-size: 12px; padding: 5px; flex-grow: 1; display: flex; align-items: center; justify-content: center; }

        .delete-btn { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.6); color: var(--error); border: none; width: 30px; height: 30px; border-bottom-right-radius: 10px; font-size: 18px; z-index: 5; }

        .qty-badge { background: var(--secondary); color: #000; border-radius: 4px; font-size: 12px; margin: 0 5px 5px; padding: 2px; font-weight: bold; }
        .exp-tag { font-size: 10px; background: rgba(0,0,0,0.5); color: var(--primary); margin-bottom: 4px; border-radius: 4px; }

        /* מודלים */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--surface); margin: 15% auto; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #444; }
        
        .modal-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #121212; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        
        .quick-qty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
        .btn-quick { background: #333; color: var(--secondary); border: 1px solid #444; padding: 15px 0; border-radius: 10px; font-weight: bold; font-size: 18px; }

        .btn-confirm { width: 100%; background: var(--secondary); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-cancel { width: 100%; background: transparent; color: #888; border: none; padding: 10px; margin-top: 5px; cursor: pointer; }
        .btn-danger { background: var(--error); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }

        /* רשימת סיכום */
        .summary-item { display: flex; align-items: center; padding: 10px; background: #252525; margin-bottom: 8px; border-radius: 12px; border: 1px solid #333; }
        .summary-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-left: 10px; }
        .v-btn { background: var(--secondary); color: black; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; flex-shrink: 0; }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--surface); padding: 15px; border-top: 1px solid #333; z-index: 90; box-sizing: border-box; }
        .summary-btn { background: var(--primary); color: #000; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1em; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">ניהול חוסרים Pro Vision</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('snacks', this)">חטיפים</div>
    <div class="tab" onclick="showTab('cigarettes', this)">סיגריות</div>
    <div class="tab" onclick="showTab('general', this)">כללי</div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="חיפוש מוצר..." oninput="renderUI()">
</div>

<div id="snacks" class="shelf-container active"><div class="grid" id="grid-snacks"></div></div>
<div id="cigarettes" class="shelf-container"><div class="grid" id="grid-cigarettes"></div></div>
<div id="general" class="shelf-container"><div class="grid" id="grid-general"></div></div>

<div style="text-align:center; margin-bottom: 20px;"><button class="btn-confirm" style="width:auto; padding:10px 30px; background:#3700b3; color:white;" onclick="openAddModal()">+ הוסף מוצר חדש</button></div>

<div id="qtyModal" class="modal">
    <div class="modal-content">
        <div id="qtyTitle" style="color:var(--primary); font-weight:bold; font-size:1.2em;"></div>
        <div class="quick-qty-grid">
            <button class="btn-quick" onclick="setQuickQty('1')">1</button>
            <button class="btn-quick" onclick="setQuickQty('2')">2</button>
            <button class="btn-quick" onclick="setQuickQty('3')">3</button>
            <button class="btn-quick" onclick="setQuickQty('4')">4</button>
            <button class="btn-quick" onclick="setQuickQty('5')">5</button>
            <button class="btn-quick" onclick="setQuickQty('6')">6</button>
        </div>
        <input type="text" id="qtyInput" class="modal-input" placeholder="כמות חסרה...">
        <div style="font-size:12px; color:var(--primary); margin-top:5px;">תאריך תפוגה:</div>
        <input type="date" id="expInput" class="modal-input">
        <button class="btn-confirm" id="qtyConfirmBtn">אישור</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <div style="font-size:40px;">⚠️</div>
        <div id="confirmTitle" style="color:var(--error); font-weight:bold; margin:10px 0;">למחוק את המוצר?</div>
        <button class="btn-danger" id="confirmOkBtn">כן, מחק</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="resetModal" class="modal">
    <div class="modal-content">
        <div style="font-size:40px;">🗑️</div>
        <div style="color:var(--error); font-weight:bold; margin:10px 0; font-size:1.2em;">ניקוי כל החוסרים?</div>
        <p style="font-size:14px; color:#888;">הפעולה תאפס את כל הכמויות שסימנת.</p>
        <button class="btn-danger" onclick="executeReset()">נקה הכל</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:10px;">הוספת מוצר</div>
        <select id="addCat" class="modal-input">
            <option value="snacks">חטיפים</option>
            <option value="cigarettes">סיגריות</option>
            <option value="general">כללי</option>
        </select>
        <input type="text" id="newName" class="modal-input" placeholder="שם המוצר">
        <input type="text" id="newImg" class="modal-input" placeholder="קישור לתמונה">
        <input type="date" id="newExp" class="modal-input">
        <button class="btn-confirm" id="addConfirmBtn">שמור</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="summaryModal" class="modal">
    <div class="modal-content" style="max-height:85vh; width:95%; overflow-y:auto;">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:15px; font-size:1.2em;">📋 מה חסר להזמנה</div>
        <div id="summaryList"></div>
        <div style="margin-top:20px;">
            <button class="btn-danger" style="background:#3b1515; margin-bottom:10px;" onclick="openResetModal()">🗑️ ניקוי רשימת הזמנה</button>
            <button class="btn-confirm" onclick="closeAllModals()">חזור</button>
        </div>
    </div>
</div>

<div class="footer">
    <button class="summary-btn" onclick="showSummary()">הצג רשימה להורדה</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let localData = { products: {}, currentOrder: {} };

    db.ref('/').on('value', snap => {
        localData = snap.val() || { products: {}, currentOrder: {} };
        renderUI();
        if(document.getElementById('summaryModal').style.display === 'block') showSummary();
    });

    function formatDate(dateStr) {
        if(!dateStr) return "";
        const d = new Date(dateStr);
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear().toString().slice(-2)}`;
    }

    function renderUI() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        ['snacks', 'cigarettes', 'general'].forEach(cat => {
            const grid = document.getElementById(`grid-${cat}`);
            if(!grid) return;
            grid.innerHTML = '';
            
            const prods = localData.products ? (localData.products[cat] || {}) : {};
            
            // מיון: קודם אלו עם הכמות (has-qty), אחר כך לפי א-ב
            const sortedNames = Object.keys(prods).sort((a, b) => {
                const qtyA = localData.currentOrder && localData.currentOrder[a] ? 1 : 0;
                const qtyB = localData.currentOrder && localData.currentOrder[b] ? 1 : 0;
                if (qtyA !== qtyB) return qtyB - qtyA;
                return a.localeCompare(b);
            });

            sortedNames.forEach(name => {
                if (!name.toLowerCase().includes(search)) return;
                const p = prods[name];
                const qty = localData.currentOrder ? (localData.currentOrder[name] || "") : "";
                
                const div = document.createElement('div');
                div.className = `item ${qty ? 'has-qty' : ''}`;
                div.onclick = () => openQtyModal(cat, name, p.exp || '', qty);
                div.innerHTML = `
                    <button class="delete-btn" onclick="askDelete('${cat}','${name}',event)">×</button>
                    ${p.img ? `<img src="${p.img}" class="item-img" onerror="this.src=''; this.className='no-img'">` : `<div style="height:80px; display:flex; align-items:center; justify-content:center; font-size:30px;">📦</div>`}
                    <div class="item-name">${name}</div>
                    ${p.exp ? `<div class="exp-tag">${formatDate(p.exp)}</div>` : ''}
                    ${qty ? `<div class="qty-badge">${qty}</div>` : ''}
                `;
                grid.appendChild(div);
            });
        });
    }

    function askDelete(cat, name, e) {
        e.stopPropagation();
        document.getElementById('confirmTitle').innerText = `למחוק את ${name}?`;
        document.getElementById('confirmModal').style.display = 'block';
        document.getElementById('confirmOkBtn').onclick = () => {
            db.ref(`products/${cat}/${name}`).remove();
            db.ref(`currentOrder/${name}`).remove();
            closeAllModals();
        };
    }

    function openResetModal() { document.getElementById('resetModal').style.display = 'block'; }
    function executeReset() {
        db.ref('currentOrder').set(null);
        closeAllModals();
    }

    function openQtyModal(cat, name, exp, qty) {
        document.getElementById('qtyTitle').innerText = name;
        document.getElementById('qtyInput').value = qty;
        document.getElementById('expInput').value = exp;
        document.getElementById('qtyModal').style.display = 'block';
        document.getElementById('qtyConfirmBtn').onclick = () => {
            const q = document.getElementById('qtyInput').value.trim();
            const e = document.getElementById('expInput').value;
            db.ref(`currentOrder/${name}`).set(q || null);
            db.ref(`products/${cat}/${name}/exp`).set(e || null);
            closeAllModals();
        };
    }

    function setQuickQty(v) {
        document.getElementById('qtyInput').value = v;
        document.getElementById('qtyConfirmBtn').click();
    }

    function openAddModal() {
        document.getElementById('addModal').style.display = 'block';
        document.getElementById('addConfirmBtn').onclick = () => {
            const cat = document.getElementById('addCat').value;
            const name = document.getElementById('newName').value.trim();
            const img = document.getElementById('newImg').value.trim();
            const exp = document.getElementById('newExp').value;
            if(name) db.ref(`products/${cat}/${name}`).set({ img, exp });
            closeAllModals();
            document.getElementById('newName').value = "";
            document.getElementById('newImg').value = "";
        };
    }

    function showSummary() {
        const list = document.getElementById('summaryList');
        list.innerHTML = '';
        const order = localData.currentOrder || {};
        const keys = Object.keys(order);
        if(keys.length === 0) { list.innerHTML = "<p style='padding:20px; opacity:0.5;'>אין חוסרים</p>"; return; }
        
        keys.forEach(k => {
            let imgUrl = "";
            ['snacks', 'cigarettes', 'general'].forEach(cat => {
                if(localData.products[cat] && localData.products[cat][k]) imgUrl = localData.products[cat][k].img;
            });
            list.innerHTML += `
                <div class="summary-item">
                    <button class="v-btn" onclick="db.ref('currentOrder/${k}').remove()">✓</button>
                    <div style="flex:1; text-align:right; margin-right:10px;">
                        <span style="font-weight:bold; display:block;">${k}</span>
                        <span style="color:var(--secondary);">כמות: ${order[k]}</span>
                    </div>
                    ${imgUrl ? `<img src="${imgUrl}" class="summary-img">` : `<div class="summary-img" style="display:flex; align-items:center; justify-content:center;">📦</div>`}
                </div>`;
        });
        document.getElementById('summaryModal').style.display = 'block';
    }

    function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function showTab(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.shelf-container').forEach(c => c.classList.remove('active'));
        el.classList.add('active'); document.getElementById(cat).classList.add('active');
    }
</script>
</body>
</html>
