<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול חוסרים Pro Vision</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #ff5252;
            --warning: #ffb74d;
            --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', system-ui; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 160px; direction: rtl; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .header { background: var(--surface); color: var(--primary); text-align: center; padding: 15px; font-size: 1.2em; font-weight: bold; border-bottom: 2px solid #333; }
        
        /* טאבים */
        .tabs { display: flex; background: var(--surface); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; color: #888; border-bottom: 3px solid transparent; font-size: 15px; font-weight: bold; transition: 0.3s; }
        .tab.active { color: var(--secondary); border-bottom-color: var(--secondary); background: #252525; }
        
        .search-container { padding: 10px 15px; background: var(--bg); border-bottom: 1px solid #333; }
        #searchInput { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333; background: var(--surface); color: #fff; box-sizing: border-box; outline: none; font-size: 16px; transition: 0.3s; }
        #searchInput:focus { border-color: var(--primary); }

        .shelf-container { display: none; padding: 10px; }
        .shelf-container.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        /* כרטיס מוצר */
        .item { 
            background: var(--surface); border-radius: 15px; text-align: center; 
            border: 1px solid #333; cursor: pointer; position: relative; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 135px; color: var(--text); overflow: hidden; transition: 0.2s;
        }
        .item.has-qty { border-color: var(--secondary); border-width: 2px; box-shadow: 0 0 10px rgba(3, 218, 198, 0.2); }
        
        .item-img { width: 100%; height: 85px; object-fit: cover; background: #2a2a2a; }
        .no-img { height: 85px; width: 100%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        .item-name { font-weight: bold; font-size: 12px; padding: 6px 4px; flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }

        .delete-btn { position: absolute; top: 0; left: 0; background: rgba(255, 82, 82, 0.2); color: var(--error); border: none; border-bottom-right-radius: 12px; width: 32px; height: 32px; font-size: 20px; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }

        .qty-badge { background: var(--secondary); color: #000; border-radius: 6px; font-size: 12px; margin-bottom: 5px; padding: 3px 6px; font-weight: bold; width: 85%; }
        .exp-tag { font-size: 10px; padding: 2px 5px; border-radius: 5px; background: rgba(0,0,0,0.7); margin-bottom: 4px; color: var(--warning); border: 1px solid rgba(255,183,77,0.3); }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--surface); padding: 15px; border-top: 1px solid #333; z-index: 100; box-sizing: border-box; }
        .summary-btn { background: var(--primary); color: #000; padding: 16px; border-radius: 14px; border: none; font-weight: bold; font-size: 1.1em; width: 100%; cursor: pointer; box-shadow: 0 4px 15px rgba(187, 134, 252, 0.3); }
        
        /* מודלים - עיצוב יוקרתי */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        .modal-content { background: var(--surface); margin: 15% auto; padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; border: 1px solid #444; text-align: center; position: relative; }
        
        /* עיצוב שדות קלט ותאריך */
        .modal-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #121212; color: white; font-size: 16px; text-align: center; box-sizing: border-box; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); scale: 1.3; cursor: pointer; }
        
        .quick-qty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 15px 0; }
        .btn-quick { background: #2a2a2a; color: var(--secondary); border: 1px solid #444; padding: 18px 0; border-radius: 12px; font-weight: bold; font-size: 20px; cursor: pointer; }

        .btn-confirm { width: 100%; background: var(--secondary); color: black; border: none; padding: 16px; border-radius: 14px; font-weight: bold; margin-top: 10px; font-size: 16px; cursor: pointer; }
        .btn-cancel { width: 100%; background: transparent; color: #888; border: 1px solid #444; padding: 14px; border-radius: 14px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: var(--error); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; }

        /* רשימת סיכום */
        .summary-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #333; background: #252525; margin-bottom: 10px; border-radius: 15px; }
        .summary-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; margin-left: 15px; border: 1px solid #444; }
        .v-btn { background: var(--secondary); color: black; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="header">ניהול חוסרים Pro Vision</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('snacks', this)">חטיפים</div>
    <div class="tab" onclick="showTab('cigarettes', this)">סיגריות</div>
    <div class="tab" onclick="showTab('general', this)">כללי</div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="חיפוש מהיר..." oninput="renderUI()">
</div>

<div id="snacks" class="shelf-container active"><div class="grid" id="grid-snacks"></div></div>
<div id="cigarettes" class="shelf-container"><div class="grid" id="grid-cigarettes"></div></div>
<div id="general" class="shelf-container"><div class="grid" id="grid-general"></div></div>

<div style="text-align:center; margin: 20px;"><button class="btn-confirm" style="width:auto; padding:15px 45px; background:var(--primary); color:black;" onclick="openAddModal()">+ הוסף מוצר חדש</button></div>

<div id="qtyModal" class="modal">
    <div class="modal-content">
        <div id="qtyTitle" style="color:var(--primary); font-weight:bold; font-size:1.4em; margin-bottom:10px;"></div>
        <div class="quick-qty-grid">
            <button class="btn-quick" onclick="setQuickQty('1')">1</button>
            <button class="btn-quick" onclick="setQuickQty('2')">2</button>
            <button class="btn-quick" onclick="setQuickQty('3')">3</button>
            <button class="btn-quick" onclick="setQuickQty('4')">4</button>
            <button class="btn-quick" onclick="setQuickQty('5')">5</button>
            <button class="btn-quick" onclick="setQuickQty('6')">6</button>
        </div>
        <input type="text" id="qtyInput" class="modal-input" placeholder="כמות חסרה...">
        <div style="margin-top:10px; font-size:14px; color:var(--primary);">🗓️ תאריך תפוגה (מספרים):</div>
        <input type="date" id="expInput" class="modal-input">
        <button class="btn-confirm" id="qtyConfirmBtn">שמור ועדכן</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content" style="border-top: 5px solid var(--error);">
        <div style="font-size: 50px; margin-bottom: 10px;">🗑️</div>
        <div id="confirmTitle" style="color:var(--error); font-weight:bold; font-size:1.4em; margin-bottom:10px;">למחוק את המוצר?</div>
        <p id="confirmText" style="color:#aaa; font-size: 14px; margin-bottom:25px;">הפעולה תסיר את המוצר לצמיתות מהרשימות.</p>
        <button class="btn-danger" id="confirmOkBtn">כן, מחק מוצר</button>
        <button class="btn-cancel" onclick="closeAllModals()">לא, חזור אחורה</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:15px; font-size:1.3em;">הוספת מוצר חדש</div>
        <select id="addCat" class="modal-input">
            <option value="snacks">חטיפים</option>
            <option value="cigarettes">סיגריות</option>
            <option value="general">כללי</option>
        </select>
        <input type="text" id="newName" class="modal-input" placeholder="שם המוצר">
        <input type="text" id="newImg" class="modal-input" placeholder="קישור לתמונה">
        <input type="date" id="newExp" class="modal-input">
        <button class="btn-confirm" id="addConfirmBtn">שמור מוצר</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="summaryModal" class="modal">
    <div class="modal-content" style="max-height:88vh; width:95%; overflow-y:auto;">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:20px; font-size:1.4em;">📦 רשימת מילוי</div>
        <div id="summaryList"></div>
        <div style="display:flex; flex-direction:column; gap:8px; margin-top:20px;">
            <button class="btn-danger" style="background:#3b1515; border:1px solid var(--error);" onclick="clearAllItems()">🗑️ נקה את כל הרשימה</button>
            <button class="btn-confirm" onclick="closeAllModals()">סגור חלון</button>
        </div>
    </div>
</div>

<div class="footer">
    <button class="summary-btn" onclick="showSummary()">הצג רשימה להורדה</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let localData = { products: {}, currentOrder: {} };

    db.ref('/').on('value', snap => {
        localData = snap.val() || { products: {}, currentOrder: {} };
        renderUI();
        if(document.getElementById('summaryModal').style.display === 'block') showSummary();
    });

    function formatDate(dateStr) {
        if(!dateStr) return "";
        const d = new Date(dateStr);
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear().toString().slice(-2)}`;
    }

    function renderUI() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const grids = { snacks: '', cigarettes: '', general: '' };

        ['snacks', 'cigarettes', 'general'].forEach(cat => {
            const prods = localData.products ? (localData.products[cat] || {}) : {};
            Object.keys(prods).sort().forEach(name => {
                if (!name.toLowerCase().includes(search)) return;

                const p = prods[name];
                const qty = localData.currentOrder ? (localData.currentOrder[name] || "") : "";
                
                grids[cat] += `
                    <div class="item ${qty ? 'has-qty' : ''}" onclick="openQtyModal('${cat}','${name}','${p.exp || ''}','${qty}')">
                        <button class="delete-btn" onclick="askDelete('${cat}','${name}',event)">×</button>
                        ${p.img ? `<img src="${p.img}" class="item-img" onerror="this.src=''; this.className='no-img'">` : `<div class="no-img">📦</div>`}
                        <div class="item-name">${name}</div>
                        ${p.exp ? `<div class="exp-tag">${formatDate(p.exp)}</div>` : ''}
                        ${qty ? `<div class="qty-badge">${qty}</div>` : ''}
                    </div>`;
            });
        });

        for(let g in grids) {
            const el = document.getElementById(`grid-${g}`);
            if(el) el.innerHTML = grids[g] || '<p style="grid-column:span 3; opacity:0.3; padding:20px;">אין מוצרים</p>';
        }
    }

    function askDelete(cat, name, e) {
        e.stopPropagation();
        document.getElementById('confirmTitle').innerText = `למחוק את ${name}?`;
        document.getElementById('confirmModal').style.display = 'block';
        document.getElementById('confirmOkBtn').onclick = () => {
            db.ref(`products/${cat}/${name}`).remove();
            db.ref(`currentOrder/${name}`).remove();
            closeAllModals();
        };
    }

    function clearAllItems() {
        document.getElementById('confirmTitle').innerText = `לנקות הכל?`;
        document.getElementById('confirmText').innerText = `זה ימחק את כל החוסרים שסימנת כרגע.`;
        document.getElementById('confirmModal').style.display = 'block';
        document.getElementById('confirmOkBtn').onclick = () => {
            db.ref('currentOrder').set(null);
            closeAllModals();
        };
    }

    function openQtyModal(cat, name, exp, qty) {
        document.getElementById('qtyTitle').innerText = name;
        document.getElementById('qtyInput').value = qty;
        document.getElementById('expInput').value = exp;
        document.getElementById('qtyModal').style.display = 'block';
        document.getElementById('qtyConfirmBtn').onclick = () => {
            const q = document.getElementById('qtyInput').value.trim();
            const e = document.getElementById('expInput').value;
            db.ref(`currentOrder/${name}`).set(q || null);
            db.ref(`products/${cat}/${name}/exp`).set(e || null);
            closeAllModals();
        };
    }

    function setQuickQty(v) {
        document.getElementById('qtyInput').value = v;
        document.getElementById('qtyConfirmBtn').click();
    }

    function openAddModal() {
        document.getElementById('addModal').style.display = 'block';
        document.getElementById('addConfirmBtn').onclick = () => {
            const cat = document.getElementById('addCat').value;
            const name = document.getElementById('newName').value.trim();
            const img = document.getElementById('newImg').value.trim();
            const exp = document.getElementById('newExp').value;
            if(name) db.ref(`products/${cat}/${name}`).set({ img, exp });
            closeAllModals();
            document.getElementById('newName').value = "";
            document.getElementById('newImg').value = "";
        };
    }

    function showSummary() {
        const list = document.getElementById('summaryList');
        list.innerHTML = '';
        const order = localData.currentOrder || {};
        const keys = Object.keys(order);
        if(keys.length === 0) { list.innerHTML = "<p style='padding:30px; opacity:0.5;'>אין חוסרים</p>"; return; }
        
        keys.forEach(k => {
            let imgUrl = "";
            ['snacks', 'cigarettes', 'general'].forEach(cat => {
                if(localData.products[cat] && localData.products[cat][k]) imgUrl = localData.products[cat][k].img;
            });
            list.innerHTML += `
                <div class="summary-item">
                    <button class="v-btn" onclick="db.ref('currentOrder/${k}').remove()">✓</button>
                    <div style="flex:1; text-align:right; margin:0 15px;">
                        <span style="font-weight:bold; display:block;">${k}</span>
                        <span style="color:var(--secondary); font-size:14px;">כמות: ${order[k]}</span>
                    </div>
                    ${imgUrl ? `<img src="${imgUrl}" class="summary-img">` : `<div class="summary-img" style="display:flex; align-items:center; justify-content:center;">📦</div>`}
                </div>`;
        });
        document.getElementById('summaryModal').style.display = 'block';
    }

    function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function showTab(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.shelf-container').forEach(c => c.classList.remove('active'));
        el.classList.add('active'); document.getElementById(cat).classList.add('active');
    }
</script>
</body>
</html>
