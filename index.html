<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול חוסרים Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #bb86fc;
            --secondary: #03dac6; --error: #ff5252; --warning: #ffb74d; --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; direction: rtl; }
        .header { background: var(--surface); color: var(--primary); text-align: center; padding: 15px; font-weight: bold; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        
        .tabs { display: flex; background: var(--surface); border-bottom: 1px solid #333; position: sticky; top: 52px; z-index: 100; }
        .tab { flex: 1; text-align: center; padding: 14px; cursor: pointer; color: #888; border-bottom: 3px solid transparent; font-weight: bold; }
        .tab.active { color: var(--secondary); border-bottom-color: var(--secondary); background: #252525; }
        
        .shelf-container { display: none; padding: 10px; }
        .shelf-container.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .item { 
            background: var(--surface); border-radius: 12px; text-align: center; 
            border: 1px solid #333; cursor: pointer; position: relative; 
            display: flex; flex-direction: column; min-height: 150px; overflow: hidden;
        }
        .item.has-qty { border: 2px solid var(--secondary) !important; background: #1b3a36; }
        .exp-expired { border: 2px solid var(--error) !important; }
        .exp-warning { border: 2px solid var(--warning) !important; }

        .item-img { width: 100%; height: 80px; object-fit: cover; background: #2a2a2a; }
        .item-name { font-weight: bold; font-size: 12px; padding: 5px; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .delete-btn { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.6); color: var(--error); border: none; width: 30px; height: 30px; border-bottom-right-radius: 10px; z-index: 5; font-size: 18px; }
        .qty-badge { background: var(--secondary); color: #000; border-radius: 4px; font-size: 12px; margin: 0 5px 5px; padding: 2px; font-weight: bold; }
        .exp-tag { font-size: 10px; background: rgba(0,0,0,0.6); margin-bottom: 4px; border-radius: 4px; padding: 1px; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--surface); margin: 5% auto; padding: 20px; border-radius: 20px; width: 92%; max-width: 380px; text-align: center; border: 1px solid #444; box-sizing: border-box; }
        
        .quick-qty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .btn-qty { background: #333; color: var(--secondary); border: 1px solid #444; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        .modal-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #121212; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        .btn-confirm { width: 100%; background: var(--secondary); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-danger { width: 100%; background: var(--error); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-cancel { width: 100%; background: transparent; color: #888; border: none; padding: 10px; cursor: pointer; }

        /* סיכום רשימה */
        .summary-item { display: flex; align-items: center; background: #2a2a2a; margin-bottom: 12px; padding: 12px; border-radius: 15px; border: 1px solid #3d3d3d; }
        .summary-right { display: flex; align-items: center; flex: 1; text-align: right; }
        .summary-img { width: 55px; height: 55px; object-fit: cover; border-radius: 10px; margin-left: 12px; border: 1px solid #444; }
        .v-btn { background: var(--secondary); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .v-btn:active { transform: scale(0.9); background: #02b3a3; }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--surface); padding: 15px; border-top: 1px solid #333; z-index: 90; box-sizing: border-box; }
        .summary-btn { background: var(--primary); color: #000; padding: 16px; border-radius: 15px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="header">ניהול חוסרים Pro Vision</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('snacks', this)">חטיפים</div>
    <div class="tab" onclick="showTab('cigarettes', this)">סיגריות</div>
    <div class="tab" onclick="showTab('general', this)">כללי</div>
</div>

<div id="snacks" class="shelf-container active"><div class="grid" id="grid-snacks"></div></div>
<div id="cigarettes" class="shelf-container"><div class="grid" id="grid-cigarettes"></div></div>
<div id="general" class="shelf-container"><div class="grid" id="grid-general"></div></div>

<div style="text-align:center; margin: 20px;"><button class="btn-confirm" style="width:auto; padding:10px 30px; background:#3700b3; color:white;" onclick="openAddModal()">+ הוסף מוצר חדש</button></div>

<div id="qtyModal" class="modal">
    <div class="modal-content">
        <div id="qtyTitle" style="color:var(--primary); font-weight:bold; font-size:1.4em; margin-bottom:10px;"></div>
        <div class="quick-qty-grid">
            <button class="btn-qty" onclick="setQuickQty('1')">1</button>
            <button class="btn-qty" onclick="setQuickQty('2')">2</button>
            <button class="btn-qty" onclick="setQuickQty('3')">3</button>
            <button class="btn-qty" onclick="setQuickQty('4')">4</button>
            <button class="btn-qty" onclick="setQuickQty('5')">5</button>
            <button class="btn-qty" onclick="setQuickQty('6')">6</button>
        </div>
        <input type="number" id="qtyInput" class="modal-input" placeholder="או כמות אחרת...">
        <div style="text-align:right; font-size:13px; color:var(--primary);">תאריך תפוגה:</div>
        <input type="date" id="expInput" class="modal-input">
        <button class="btn-confirm" id="qtyConfirmBtn">עדכן חוסר</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:15px;">הוספת מוצר לקטלוג</div>
        <select id="addCat" class="modal-input">
            <option value="snacks">חטיפים</option>
            <option value="cigarettes">סיגריות</option>
            <option value="general">כללי</option>
        </select>
        <input type="text" id="newName" class="modal-input" placeholder="שם המוצר">
        <input type="text" id="newImg" class="modal-input" placeholder="לינק לתמונה (אופציונלי)">
        <button class="btn-confirm" onclick="saveNewProduct()">שמור מוצר</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="summaryModal" class="modal">
    <div class="modal-content" style="max-height:85vh; overflow-y:auto;">
        <div style="color:var(--primary); font-weight:bold; font-size:1.5em; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">📋 רשימת חוסרים</div>
        <div id="summaryList"></div>
        <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
            <button class="btn-danger" onclick="clearAllOrders()">🗑️ נקה את כל הרשימה</button>
            <button class="btn-confirm" style="background:#333; color:white;" onclick="closeAllModals()">חזור</button>
        </div>
    </div>
</div>

<div class="footer"><button class="summary-btn" onclick="showSummary()">🛒 הצג רשימת חוסרים</button></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let localData = { products: {}, currentOrder: {} };

    db.ref('/').on('value', snap => {
        localData = snap.val() || { products: {}, currentOrder: {} };
        renderUI();
        // עדכון הרשימה בתוך המודל אם הוא פתוח
        if(document.getElementById('summaryModal').style.display === 'block') {
            updateSummaryListOnly();
        }
    });

    function formatDate(dateStr) {
        if(!dateStr) return "";
        const d = new Date(dateStr);
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear().toString().slice(-2)}`;
    }

    function renderUI() {
        const today = new Date();
        const nextMonth = new Date(); nextMonth.setMonth(today.getMonth() + 1);

        ['snacks', 'cigarettes', 'general'].forEach(cat => {
            const grid = document.getElementById(`grid-${cat}`);
            if(!grid) return;
            grid.innerHTML = '';
            
            const catProds = (localData.products && localData.products[cat]) ? localData.products[cat] : {};
            const sortedNames = Object.keys(catProds).sort((a, b) => {
                const qtyA = (localData.currentOrder && localData.currentOrder[a]) ? 1 : 0;
                const qtyB = (localData.currentOrder && localData.currentOrder[b]) ? 1 : 0;
                return qtyB - qtyA || a.localeCompare(b);
            });

            sortedNames.forEach(name => {
                const p = catProds[name];
                const qty = (localData.currentOrder && localData.currentOrder[name]) ? localData.currentOrder[name] : "";
                let expClass = "";
                if(p.exp) {
                    const d = new Date(p.exp);
                    if(d < today) expClass = "exp-expired";
                    else if(d < nextMonth) expClass = "exp-warning";
                }

                const div = document.createElement('div');
                div.className = `item ${qty ? 'has-qty' : ''} ${expClass}`;
                div.onclick = () => openQtyModal(cat, name, p.exp || '', qty);
                div.innerHTML = `
                    <button class="delete-btn" onclick="deleteProd('${cat}','${name}',event)">×</button>
                    ${p.img ? `<img src="${p.img}" class="item-img">` : `<div style="height:80px; display:flex; align-items:center; justify-content:center; font-size:30px;">📦</div>`}
                    <div class="item-name">${name}</div>
                    ${p.exp ? `<div class="exp-tag" style="color:${expClass=='exp-expired'?'var(--error)':'var(--warning)'}">${formatDate(p.exp)}</div>` : ''}
                    ${qty ? `<div class="qty-badge">${qty}</div>` : ''}
                `;
                grid.appendChild(div);
            });
        });
    }

    function showSummary() {
        updateSummaryListOnly();
        document.getElementById('summaryModal').style.display = 'block';
    }

    function updateSummaryListOnly() {
        const list = document.getElementById('summaryList');
        list.innerHTML = '';
        const order = localData.currentOrder || {};
        const keys = Object.keys(order);
        
        if(keys.length === 0) {
            list.innerHTML = "<p style='padding:40px; opacity:0.5;'>אין חוסרים ברשימה</p>";
        } else {
            keys.forEach(k => {
                let imgUrl = "";
                for(let cat in localData.products) { if(localData.products[cat][k]) imgUrl = localData.products[cat][k].img; }
                list.innerHTML += `
                    <div class="summary-item">
                        <div class="summary-right">
                            ${imgUrl ? `<img src="${imgUrl}" class="summary-img">` : `<div class="summary-img" style="display:flex; align-items:center; justify-content:center; background:#444; color:white;">📦</div>`}
                            <div style="display:flex; flex-direction:column;">
                                <span style="font-weight:bold; color:white; font-size:16px;">${k}</span>
                                <span style="color:var(--secondary); font-size:14px; font-weight:bold;">חסר: ${order[k]}</span>
                            </div>
                        </div>
                        <button class="v-btn" onclick="removeFromOrder('${k}')">✓</button>
                    </div>`;
            });
        }
    }

    function removeFromOrder(name) {
        // מחיקת המוצר מהרשימה ב-Firebase
        db.ref(`currentOrder/${name}`).remove();
    }

    function clearAllOrders() {
        if(confirm("למחוק את כל רשימת החוסרים?")) {
            db.ref('currentOrder').set(null);
        }
    }

    function openQtyModal(cat, name, exp, qty) {
        document.getElementById('qtyTitle').innerText = name;
        document.getElementById('qtyInput').value = qty;
        document.getElementById('expInput').value = exp;
        document.getElementById('qtyModal').style.display = 'block';
        document.getElementById('qtyConfirmBtn').onclick = () => {
            const q = document.getElementById('qtyInput').value.trim();
            const e = document.getElementById('expInput').value;
            db.ref(`currentOrder/${name}`).set(q || null);
            db.ref(`products/${cat}/${name}/exp`).set(e || null);
            closeAllModals();
        };
    }

    function setQuickQty(v) {
        document.getElementById('qtyInput').value = v;
        document.getElementById('qtyConfirmBtn').click();
    }

    function showTab(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.shelf-container').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(cat).classList.add('active');
    }

    function openAddModal() { document.getElementById('addModal').style.display = 'block'; }
    function saveNewProduct() {
        const cat = document.getElementById('addCat').value;
        const name = document.getElementById('newName').value.trim();
        const img = document.getElementById('newImg').value.trim();
        if(name) db.ref(`products/${cat}/${name}`).set({ img: img, exp: "" });
        closeAllModals();
    }

    function deleteProd(cat, name, e) {
        e.stopPropagation();
        if(confirm(`למחוק את ${name} מהקטלוג?`)) {
            db.ref(`products/${cat}/${name}`).remove();
            db.ref(`currentOrder/${name}`).remove();
        }
    }

    function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
</script>
</body>
</html>
