<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול חוסרים Pro Vision</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #ff5252;
            --warning: #ffb74d;
            --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 160px; direction: rtl; overflow-x: hidden; }
        .header { background: var(--surface); color: var(--primary); text-align: center; padding: 12px; font-size: 1.1em; font-weight: bold; border-bottom: 1px solid #333; }
        
        .tabs { display: flex; background: var(--surface); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #888; border-bottom: 3px solid transparent; font-size: 14px; font-weight: bold; }
        .tab.active { color: var(--secondary); border-bottom-color: var(--secondary); background: #252525; }
        
        .search-container { padding: 8px 12px; background: var(--bg); border-bottom: 1px solid #333; }
        #searchInput { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: var(--surface); color: #fff; box-sizing: border-box; outline: none; font-size: 16px; }

        .shelf-container { display: none; padding: 10px; }
        .shelf-container.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        .item { 
            background: var(--surface); border-radius: 12px; text-align: center; 
            border: 1px solid #333; cursor: pointer; position: relative; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 125px; color: var(--text); overflow: hidden; transition: 0.2s;
        }
        .item.has-qty { background: #1b3a2a; border-color: var(--secondary); border-width: 2px; order: -1; }
        
        .exp-warning { border: 2px solid var(--warning) !important; }
        .exp-expired { border: 2px solid var(--error) !important; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .item-img { width: 100%; height: 75px; object-fit: cover; background: #2a2a2a; }
        .no-img { height: 75px; width: 100%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .item-name { font-weight: bold; font-size: 11px; padding: 4px 2px; flex-grow: 1; display: flex; align-items: center; }

        .delete-btn { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.7); color: var(--error); border: none; border-bottom-right-radius: 10px; width: 28px; height: 28px; font-size: 18px; z-index: 10; }

        .qty-badge { background: var(--secondary); color: #000; border-radius: 4px; font-size: 11px; margin-bottom: 4px; padding: 2px 4px; font-weight: bold; width: 85%; }
        .exp-tag { font-size: 10px; padding: 2px 4px; border-radius: 4px; background: rgba(0,0,0,0.8); margin-bottom: 3px; font-weight: bold; width: 90%; box-sizing: border-box; }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--surface); padding: 12px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #333; z-index: 100; box-sizing: border-box; }
        .summary-btn { background: var(--primary); color: #000; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1.1em; cursor: pointer; box-shadow: 0 4px 10px rgba(187, 134, 252, 0.3); }
        
        /* מודלים */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); }
        .modal-content { background: var(--surface); margin: 8% auto; padding: 20px; border-radius: 20px; width: 92%; max-width: 400px; border: 1px solid #333; text-align: center; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .modal-input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #121212; color: white; font-size: 16px; text-align: center; box-sizing: border-box; appearance: none; -webkit-appearance: none; }
        
        /* עיצוב בחירת תאריך */
        input[type="date"] { color-scheme: dark; border-color: var(--primary); }

        .quick-qty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .btn-quick { background: #2a2a2a; color: var(--secondary); border: 1px solid #444; padding: 15px 0; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }

        .btn-confirm { width: 100%; background: var(--secondary); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; font-size: 16px; cursor: pointer; }
        .btn-cancel { width: 100%; background: #333; color: white; border: none; padding: 12px; border-radius: 10px; margin-top: 8px; cursor: pointer; }
        
        /* כפתור ניקוי מעוצב */
        .btn-clear-all { width: 100%; background: #3b1515; color: var(--error); border: 2px solid var(--error); padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* רשימת סיכום */
        .summary-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #333; background: #252525; margin-bottom: 8px; border-radius: 12px; }
        .summary-img { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; margin-left: 12px; background: #121212; }
        .summary-info { flex: 1; text-align: right; }
        .summary-name { font-weight: bold; font-size: 15px; display: block; }
        .summary-qty { color: var(--secondary); font-weight: bold; font-size: 14px; }
        .v-btn { background: var(--secondary); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

        .modal-footer-btns { display: flex; flex-direction: column; gap: 5px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">ניהול חוסרים Pro Vision</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('snacks', this)">חטיפים</div>
    <div class="tab" onclick="showTab('cigarettes', this)">סיגריות</div>
    <div class="tab" onclick="showTab('general', this)">כללי</div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="חיפוש מהיר..." oninput="renderUI()">
</div>

<div id="snacks" class="shelf-container active"><div class="grid" id="grid-snacks"></div></div>
<div id="cigarettes" class="shelf-container"><div class="grid" id="grid-cigarettes"></div></div>
<div id="general" class="shelf-container"><div class="grid" id="grid-general"></div></div>

<div style="text-align:center; margin: 15px;"><button class="btn-confirm" style="width:auto; padding:12px 40px; background:#3700b3; color:white;" onclick="openAddModal()">+ הוסף מוצר חדש</button></div>

<div id="qtyModal" class="modal">
    <div class="modal-content">
        <div id="qtyTitle" style="color:var(--primary); font-weight:bold; font-size:1.3em;"></div>
        <div class="quick-qty-grid">
            <button class="btn-quick" onclick="setQuickQty('1')">1</button>
            <button class="btn-quick" onclick="setQuickQty('2')">2</button>
            <button class="btn-quick" onclick="setQuickQty('3')">3</button>
            <button class="btn-quick" onclick="setQuickQty('4')">4</button>
            <button class="btn-quick" onclick="setQuickQty('5')">5</button>
            <button class="btn-quick" onclick="setQuickQty('6')">6</button>
        </div>
        <input type="text" id="qtyInput" class="modal-input" placeholder="כמות חסרה...">
        <div style="margin-top:10px; font-size:13px; color:var(--primary); font-weight:bold;">📅 תאריך תפוגה:</div>
        <input type="date" id="expInput" class="modal-input">
        <button class="btn-confirm" id="qtyConfirmBtn">שמור עדכון</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:10px; font-size:1.2em;">מוצר חדש למערכת</div>
        <select id="addCat" class="modal-input">
            <option value="snacks">חטיפים</option>
            <option value="cigarettes">סיגריות</option>
            <option value="general">כללי</option>
        </select>
        <input type="text" id="newName" class="modal-input" placeholder="שם המוצר">
        <input type="text" id="newImg" class="modal-input" placeholder="קישור לתמונה">
        <div style="margin-top:10px; font-size:13px; color:var(--primary); text-align:right;">תאריך תפוגה (אופציונלי):</div>
        <input type="date" id="newExp" class="modal-input">
        <button class="btn-confirm" id="addConfirmBtn">שמור מוצר</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="summaryModal" class="modal">
    <div class="modal-content" style="max-height:88vh; width:95%; overflow-y:auto; padding:15px;">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:15px; font-size:1.3em;">📋 רשימת מילוי</div>
        <div id="summaryList"></div>
        
        <div class="modal-footer-btns">
            <button class="btn-clear-all" onclick="clearList()">
                <span>🗑️</span> נקה את כל הרשימה
            </button>
            <button class="btn-cancel" style="background:#222; border:1px solid #444;" onclick="closeAllModals()">סגור חלון</button>
        </div>
    </div>
</div>

<div class="footer">
    <button class="summary-btn" onclick="showSummary()">הצג רשימה להורדה</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let localData = { products: {}, currentOrder: {} };

    db.ref('/').on('value', snap => {
        localData = snap.val() || { products: {}, currentOrder: {} };
        renderUI();
        if(document.getElementById('summaryModal').style.display === 'block') showSummary();
    });

    function formatDate(dateStr) {
        if(!dateStr) return "";
        const d = new Date(dateStr);
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear().toString().slice(-2)}`;
    }

    function renderUI() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const grids = { snacks: '', cigarettes: '', general: '' };
        const today = new Date();
        const nextMonth = new Date(); nextMonth.setMonth(today.getMonth() + 1);

        ['snacks', 'cigarettes', 'general'].forEach(cat => {
            const prods = localData.products ? (localData.products[cat] || {}) : {};
            Object.keys(prods).sort().forEach(name => {
                if (!name.toLowerCase().includes(search)) return;

                const p = prods[name];
                const qty = localData.currentOrder ? (localData.currentOrder[name] || "") : "";
                const expDate = p.exp ? new Date(p.exp) : null;
                
                let expClass = "";
                if (expDate) {
                    if (expDate < today) expClass = "exp-expired";
                    else if (expDate < nextMonth) expClass = "exp-warning";
                }

                grids[cat] += `
                    <div class="item ${qty ? 'has-qty' : ''} ${expClass}" onclick="openQtyModal('${cat}','${name}','${p.exp || ''}','${qty}')">
                        <button class="delete-btn" onclick="askDelete('${cat}','${name}',event)">×</button>
                        ${p.img ? `<img src="${p.img}" class="item-img" onerror="this.src=''; this.className='no-img'">` : `<div class="no-img">📦</div>`}
                        <div class="item-name">${name}</div>
                        ${p.exp ? `<div class="exp-tag" style="color:${expClass=='exp-expired'?'var(--error)':'var(--warning)'}">${formatDate(p.exp)}</div>` : ''}
                        ${qty ? `<div class="qty-badge">${qty}</div>` : ''}
                    </div>`;
            });
        });

        for(let g in grids) {
            const el = document.getElementById(`grid-${g}`);
            if(el) el.innerHTML = grids[g] || '<p style="grid-column:span 3; opacity:0.3; padding:20px;">ריק</p>';
        }
    }

    function openQtyModal(cat, name, exp, qty) {
        document.getElementById('qtyTitle').innerText = name;
        document.getElementById('qtyInput').value = qty;
        document.getElementById('expInput').value = exp;
        document.getElementById('qtyModal').style.display = 'block';
        document.getElementById('qtyConfirmBtn').onclick = () => {
            const q = document.getElementById('qtyInput').value.trim();
            const e = document.getElementById('expInput').value;
            db.ref(`currentOrder/${name}`).set(q || null);
            db.ref(`products/${cat}/${name}/exp`).set(e || null);
            closeAllModals();
        };
    }

    function setQuickQty(v) {
        document.getElementById('qtyInput').value = v;
        document.getElementById('qtyConfirmBtn').click();
    }

    function openAddModal() {
        document.getElementById('addModal').style.display = 'block';
        document.getElementById('addConfirmBtn').onclick = () => {
            const cat = document.getElementById('addCat').value;
            const name = document.getElementById('newName').value.trim();
            const img = document.getElementById('newImg').value.trim();
            const exp = document.getElementById('newExp').value;
            if(name) db.ref(`products/${cat}/${name}`).set({ img, exp });
            closeAllModals();
            document.getElementById('newName').value = "";
            document.getElementById('newImg').value = "";
            document.getElementById('newExp').value = "";
        };
    }

    function showSummary() {
        const list = document.getElementById('summaryList');
        list.innerHTML = '';
        const order = localData.currentOrder || {};
        const keys = Object.keys(order);
        if(keys.length === 0) {
            list.innerHTML = "<p style='padding:30px; opacity:0.5; font-size:1.1em;'>אין מוצרים להזמנה כרגע</p>";
            return;
        }
        
        keys.forEach(k => {
            let imgUrl = "";
            ['snacks', 'cigarettes', 'general'].forEach(cat => {
                if(localData.products[cat] && localData.products[cat][k]) imgUrl = localData.products[cat][k].img;
            });

            const itemDiv = document.createElement('div');
            itemDiv.className = 'summary-item';
            itemDiv.innerHTML = `
                <button class="v-btn" onclick="db.ref('currentOrder/${k}').remove()">✓</button>
                <div class="summary-info">
                    <span class="summary-name">${k}</span>
                    <span class="summary-qty">כמות: ${order[k]}</span>
                </div>
                ${imgUrl ? `<img src="${imgUrl}" class="summary-img">` : `<div class="summary-img" style="display:flex; align-items:center; justify-content:center; background:#121212;">📦</div>`}
            `;
            list.appendChild(itemDiv);
        });
        document.getElementById('summaryModal').style.display = 'block';
    }

    function clearList() {
        if(confirm('בטוח שברצונך למחוק את כל רשימת החוסרים?')) {
            db.ref('currentOrder').set(null);
            closeAllModals();
        }
    }

    function askDelete(cat, name, e) {
        e.stopPropagation();
        if(confirm(`למחוק את ${name} מהמערכת?`)) db.ref(`products/${cat}/${name}`).remove();
    }

    function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function showTab(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.shelf-container').forEach(c => c.classList.remove('active'));
        el.classList.add('active'); document.getElementById(cat).classList.add('active');
    }
</script>
</body>
</html>
