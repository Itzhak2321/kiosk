<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול חוסרים Pro Vision</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #bb86fc;
            --secondary: #03dac6; --error: #ff5252; --warning: #ffb74d; --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; direction: rtl; }
        .header { background: var(--surface); color: var(--primary); text-align: center; padding: 15px; font-weight: bold; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        
        .tabs { display: flex; background: var(--surface); border-bottom: 1px solid #333; position: sticky; top: 52px; z-index: 100; }
        .tab { flex: 1; text-align: center; padding: 14px; cursor: pointer; color: #888; border-bottom: 3px solid transparent; font-weight: bold; }
        .tab.active { color: var(--secondary); border-bottom-color: var(--secondary); background: #252525; }
        
        .search-container { padding: 10px; }
        #searchInput { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: var(--surface); color: #fff; box-sizing: border-box; font-size: 16px; outline: none; }

        .shelf-container { display: none; padding: 10px; }
        .shelf-container.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .item { 
            background: var(--surface); border-radius: 12px; text-align: center; 
            border: 1px solid #333; cursor: pointer; position: relative; 
            display: flex; flex-direction: column; min-height: 145px; overflow: hidden;
        }
        .item.has-qty { border: 2px solid var(--secondary) !important; background: #1b3a36; }
        .exp-expired { border: 2px solid var(--error) !important; }
        .exp-warning { border: 2px solid var(--warning) !important; }

        .item-img { width: 100%; height: 80px; object-fit: cover; background: #2a2a2a; }
        .item-name { font-weight: bold; font-size: 12px; padding: 5px; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .delete-btn { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.6); color: var(--error); border: none; width: 32px; height: 32px; border-bottom-right-radius: 12px; font-size: 20px; z-index: 5; }
        .qty-badge { background: var(--secondary); color: #000; border-radius: 4px; font-size: 12px; margin: 0 5px 5px; padding: 2px; font-weight: bold; }
        .exp-tag { font-size: 10px; background: rgba(0,0,0,0.6); margin-bottom: 4px; border-radius: 4px; padding: 1px; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--surface); margin: 10% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #444; }
        .modal-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #121212; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        
        .btn-confirm { width: 100%; background: var(--secondary); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-danger { background: var(--error); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-cancel { width: 100%; background: transparent; color: #888; border: none; padding: 10px; cursor: pointer; }

        .summary-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #2a2a2a; margin-bottom: 10px; border-radius: 15px; border: 1px solid #383838; }
        .summary-right { display: flex; align-items: center; flex: 1; text-align: right; }
        .summary-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-left: 12px; border: 1px solid #444; }
        .summary-name { font-weight: bold; font-size: 16px; display: block; }
        .summary-qty { color: var(--secondary); font-size: 14px; font-weight: bold; }
        .v-btn { background: var(--secondary); color: black; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 20px; cursor: pointer; }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--surface); padding: 15px; border-top: 1px solid #333; z-index: 90; box-sizing: border-box; }
        .summary-btn { background: var(--primary); color: #000; padding: 16px; border-radius: 15px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">ניהול חוסרים Pro Vision</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('snacks', this)">חטיפים</div>
    <div class="tab" onclick="showTab('cigarettes', this)">סיגריות</div>
    <div class="tab" onclick="showTab('general', this)">כללי</div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="חיפוש מוצר..." oninput="renderUI()">
</div>

<div id="snacks" class="shelf-container active"><div class="grid" id="grid-snacks"></div></div>
<div id="cigarettes" class="shelf-container"><div class="grid" id="grid-cigarettes"></div></div>
<div id="general" class="shelf-container"><div class="grid" id="grid-general"></div></div>

<div style="text-align:center; margin: 20px;"><button class="btn-confirm" style="width:auto; padding:10px 40px; background:#3700b3; color:white;" onclick="openAddModal()">+ הוסף מוצר חדש</button></div>

<div id="summaryModal" class="modal">
    <div class="modal-content" style="max-height:85vh; width:95%; overflow-y:auto;">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:20px; font-size:1.4em;">📦 רשימת חוסרים</div>
        <div id="summaryList"></div>
        <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
            <button class="btn-danger" style="background:#4a1515;" onclick="clearAllOrders()">🗑️ נקה את כל הרשימה</button>
            <button class="btn-confirm" style="background:#333; color:white;" onclick="closeAllModals()">סגור</button>
        </div>
    </div>
</div>

<div id="qtyModal" class="modal">
    <div class="modal-content">
        <div id="qtyTitle" style="color:var(--primary); font-weight:bold; font-size:1.3em;"></div>
        <input type="text" id="qtyInput" class="modal-input" placeholder="כמות חסרה...">
        <input type="date" id="expInput" class="modal-input">
        <button class="btn-confirm" id="qtyConfirmBtn">עדכן</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div id="deleteConfirmModal" class="modal">
    <div class="modal-content">
        <div style="font-size:50px;">🗑️</div>
        <div style="color:var(--error); font-weight:bold; font-size:1.3em; margin:10px 0;">למחוק מוצר?</div>
        <p id="deleteConfirmText" style="color:#aaa;"></p>
        <button class="btn-danger" id="deleteFinalBtn">כן, מחק</button>
        <button class="btn-cancel" onclick="closeAllModals()">ביטול</button>
    </div>
</div>

<div class="footer">
    <button class="summary-btn" onclick="showSummary()">הצג רשימה להורדה</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrAIYc9yqbLvCN-0nKmls_vPsTaj6wuNo",
        authDomain: "kiosk-inventory.firebaseapp.com",
        databaseURL: "https://kiosk-inventory-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kiosk-inventory",
        storageBucket: "kiosk-inventory.firebasestorage.app",
        messagingSenderId: "25251506880",
        appId: "1:25251506880:web:939df03d8ee032d52adb25"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let localData = { products: {}, currentOrder: {} };

    db.ref('/').on('value', snap => {
        localData = snap.val() || { products: {}, currentOrder: {} };
        renderUI();
        if(document.getElementById('summaryModal').style.display === 'block') showSummary();
    });

    function formatDate(dateStr) {
        if(!dateStr) return "";
        const d = new Date(dateStr);
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear().toString().slice(-2)}`;
    }

    function renderUI() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const today = new Date();
        const nextMonth = new Date(); nextMonth.setMonth(today.getMonth() + 1);

        ['snacks', 'cigarettes', 'general'].forEach(cat => {
            const grid = document.getElementById(`grid-${cat}`);
            if(!grid) return;
            grid.innerHTML = '';
            
            const catProds = (localData.products && localData.products[cat]) ? localData.products[cat] : {};
            const sorted = Object.keys(catProds).sort((a, b) => {
                const qtyA = (localData.currentOrder && localData.currentOrder[a]) ? 1 : 0;
                const qtyB = (localData.currentOrder && localData.currentOrder[b]) ? 1 : 0;
                if (qtyA !== qtyB) return qtyB - qtyA;
                return a.localeCompare(b);
            });

            sorted.forEach(name => {
                if (!name.toLowerCase().includes(search)) return;
                const p = catProds[name];
                const qty = localData.currentOrder ? (localData.currentOrder[name] || "") : "";
                
                let expClass = "";
                if(p.exp) {
                    const d = new Date(p.exp);
                    if(d < today) expClass = "exp-expired";
                    else if(d < nextMonth) expClass = "exp-warning";
                }

                const div = document.createElement('div');
                div.className = `item ${qty ? 'has-qty' : ''} ${expClass}`;
                div.onclick = () => openQtyModal(cat, name, p.exp || '', qty);
                div.innerHTML = `
                    <button class="delete-btn" onclick="askDelete('${cat}','${name}',event)">×</button>
                    ${p.img ? `<img src="${p.img}" class="item-img">` : `<div style="height:80px; display:flex; align-items:center; justify-content:center; font-size:30px;">📦</div>`}
                    <div class="item-name">${name}</div>
                    ${p.exp ? `<div class="exp-tag" style="color:${expClass=='exp-expired'?'var(--error)':'var(--warning)'}">${formatDate(p.exp)}</div>` : ''}
                    ${qty ? `<div class="qty-badge">${qty}</div>` : ''}
                `;
                grid.appendChild(div);
            });
        });
    }

    function clearAllOrders() {
        if(confirm("למחוק את כל רשימת החוסרים שסימנת?")) {
            db.ref('currentOrder').set(null);
            closeAllModals();
        }
    }

    function askDelete(cat, name, e) {
        e.stopPropagation();
        document.getElementById('deleteConfirmText').innerText = `למחוק את ${name} לצמיתות?`;
        document.getElementById('deleteConfirmModal').style.display = 'block';
        document.getElementById('deleteFinalBtn').onclick = () => {
            db.ref(`products/${cat}/${name}`).remove();
            db.ref(`currentOrder/${name}`).remove();
            closeAllModals();
        };
    }

    function showSummary() {
        const list = document.getElementById('summaryList');
        list.innerHTML = '';
        const order = localData.currentOrder || {};
        const keys = Object.keys(order);
        if(keys.length === 0) { list.innerHTML = "<p style='padding:40px; opacity:0.5;'>אין חוסרים</p>"; return; }
        
        keys.forEach(k => {
            let imgUrl = "";
            for(let cat in localData.products) { if(localData.products[cat][k]) imgUrl = localData.products[cat][k].img; }
            list.innerHTML += `
                <div class="summary-item">
                    <div class="summary-right">
                        ${imgUrl ? `<img src="${imgUrl}" class="summary-img">` : `<div class="summary-img">📦</div>`}
                        <div class="summary-text">
                            <span class="summary-name">${k}</span>
                            <span class="summary-qty">כמות: ${order[k]}</span>
                        </div>
                    </div>
                    <button class="v-btn" onclick="db.ref('currentOrder/${k}').remove()">✓</button>
                </div>`;
        });
        document.getElementById('summaryModal').style.display = 'block';
    }

    function openQtyModal(cat, name, exp, qty) {
        document.getElementById('qtyTitle').innerText = name;
        document.getElementById('qtyInput').value = qty;
        document.getElementById('expInput').value = exp;
        document.getElementById('qtyModal').style.display = 'block';
        document.getElementById('qtyConfirmBtn').onclick = () => {
            const q = document.getElementById('qtyInput').value.trim();
            const e = document.getElementById('expInput').value;
            db.ref(`currentOrder/${name}`).set(q || null);
            db.ref(`products/${cat}/${name}/exp`).set(e || null);
            closeAllModals();
        };
    }

    function showTab(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.shelf-container').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(cat).classList.add('active');
    }
    function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
</script>
</body>
</html>
